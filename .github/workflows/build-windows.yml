name: Build Windows installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows (x64 + arm64)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Package Windows installers (x64 + arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --arm64 --publish never

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProjectMind-Windows
          path: |
            dist/*.exe
            dist/*.msi
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
            dist/latest*.yml
          fail_on_unmatched_files: false
