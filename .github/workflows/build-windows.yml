name: Build Windows installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows (x64 + arm64)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Inspect Next.js standalone bundle
        shell: bash
        run: |
          echo "--- .next/standalone top-level ---"
          ls -la .next/standalone || true
          echo "--- .next/standalone/node_modules ---"
          ls -la .next/standalone/node_modules || echo "(missing)"
          echo "--- count ---"
          if [ -d .next/standalone/node_modules ]; then
            echo "node_modules entries: $(ls .next/standalone/node_modules | wc -l)"
          fi

      - name: Assemble runtime bundle
        run: npm run prepare-bundle

      - name: Inspect final bundle
        shell: bash
        run: |
          echo "--- bundle top-level ---"
          ls -la bundle | head -30
          echo "--- bundle/node_modules count ---"
          ls bundle/node_modules | wc -l

      - name: Package Windows installers (x64 + arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --arm64 --publish never

      - name: Inspect packed output (verify node_modules survived)
        shell: bash
        run: |
          for unpacked in dist/win-unpacked dist/win-arm64-unpacked; do
            if [ -d "$unpacked" ]; then
              echo "--- $unpacked/resources/app ---"
              ls -la "$unpacked/resources/app" 2>/dev/null || echo "(missing)"
              if [ -d "$unpacked/resources/app/node_modules" ]; then
                count=$(ls "$unpacked/resources/app/node_modules" | wc -l)
                echo "node_modules entries in packed app: $count"
                if [ "$count" -lt 10 ]; then
                  echo "::error::Only $count modules in packed app/node_modules — electron-builder dropped most of the bundle. Failing the build to avoid shipping a broken installer."
                  ls "$unpacked/resources/app/node_modules" || true
                  exit 1
                fi
              else
                echo "::error::resources/app/node_modules missing entirely from $unpacked"
                exit 1
              fi
            fi
          done

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProjectMind-Windows
          path: |
            dist/*.exe
            dist/*.msi
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
            dist/latest*.yml
          fail_on_unmatched_files: false
